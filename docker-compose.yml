# Local development database for Foodi.
# Mapped to host port 5433 to avoid clashing with your local PostgreSQL 18 (5432).
services:
  db:
    image: postgres:18
    container_name: foodi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodi
      POSTGRES_PASSWORD: foodi_dev_password
      POSTGRES_DB: foodi
    ports:
      - "5433:5432"
    volumes:
      # Postgres 18+ images expect the mount at /var/lib/postgresql
      # (data is stored in a version-specific subdirectory below it).
      - foodi_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodi -d foodi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  foodi_pgdata:
